name: Detect Changes

# todo change branch main
on:
  push:
    branches:
      - "main"
  workflow_dispatch:


jobs:

  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    steps:

      -
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
        with:
          fetch-depth: 0

      # https://github.com/tj-actions/changed-files/blob/main/README.md#inputs
      -
        name: Detect Changes
        uses: tj-actions/changed-files@c3a1bb2c992d77180ae65be6ae6c166cf40f857c # v45.0.3
        id: changes
        with:
          files: |
            *.go
            *.mod
            *Dockerfile

      # Makefile
      -
        name: Generate Changelog
        run: make generate-changelog-ci
        if: steps.changes.outputs.any_changed == 'true'

      # https://github.com/peter-evans/create-pull-request#action-inputs
      -
        name: Create Pull Request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          branch: "change/${{ github.sha }}"
          commit-message: "new changes"
          title: "maybe new release?"
          delete-branch: true


  release-dispatched:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      -
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        run: make generate-changelog-ci

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          branch: "change/${{ github.sha }}"
          commit-message: "new changes"
          title: "probably new release..."
          delete-branch: true
